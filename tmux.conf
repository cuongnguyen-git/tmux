# ==================== PREFIX ====================
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Easy reload
bind r source-file ~/.tmux.conf \; display-message "✅ Config reloaded!"

# Status bar position
set -g status-position bottom

# ==================== ORIGINAL / CLASSIC COLOURS ====================
set -g default-terminal "screen-256color"

# Classic green status bar (exactly like default tmux)
set -g status-style fg=black,bg=green

# Current window highlighted in white on dark green
set -g window-status-current-style fg=white,bg=colour25,bold

# Normal windows
set -g window-status-style fg=black,bg=green

# Pane borders - default style (inactive light, active is blue)
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=green

# Copy mode - yellow highlight so you can easily see it
setw -g mode-style bg=orange,fg=black

# Copy mode position indicator
set -g copy-mode-position-format ' %l:%c [%P/%N] '

# Quality of life
set -g history-limit 10000
set -g allow-rename off
set-window-option -g mode-keys vi
