# Set prefix to Ctrl-a instead of Ctrl-b
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Quality of life stuff
set -g history-limit 100000000
set -g allow-rename off

# Search Mode VI
set-window-option -g mode-keys vi

# Set default terminal colors
set -g default-terminal "screen-256color"

# Load config with R
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Current window highlighted in black on dark green
set -g window-status-current-style bg=colour28,fg=black

# Copy mode - yellow highlight so you can easily see it
setw -g mode-style bg=colour3,fg=black
